{{/*
==============================================================================
API Server — Deployment + Service + HPA + PDB
万象积木 主服务，FastAPI 框架，HPA 自动扩缩
==============================================================================
*/}}
{{- if .Values.apiServer.enabled -}}

---
# === Deployment ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wanxiang.fullname" . }}-api-server
  namespace: {{ include "wanxiang.namespace" . }}
  labels:
    {{- include "wanxiang.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  replicas: {{ .Values.apiServer.replicaCount }}
  selector:
    matchLabels:
      {{- include "wanxiang.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "wanxiang.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-server
      annotations:
        # 配置变更时自动重启
        checksum/config: {{ include (print $.Template.BasePath "/configmap-global.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      {{- include "wanxiang.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "wanxiang.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api-server
          image: {{ include "wanxiang.image" (list . .Values.apiServer.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "wanxiang.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- toYaml .Values.apiServer.env | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "wanxiang.fullname" . }}-global-config
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.apiServer.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.apiServer.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/wanxiang
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "wanxiang.fullname" . }}-global-config
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      affinity:
        {{- include "wanxiang.podAntiAffinity" . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
# === Service ===
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wanxiang.fullname" . }}-api-server
  namespace: {{ include "wanxiang.namespace" . }}
  labels:
    {{- include "wanxiang.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  type: {{ .Values.apiServer.service.type }}
  ports:
    - port: {{ .Values.apiServer.service.port }}
      targetPort: {{ .Values.apiServer.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "wanxiang.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-server

{{- if .Values.apiServer.hpa.enabled }}
---
# === HPA — 自动扩缩 ===
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "wanxiang.fullname" . }}-api-server
  namespace: {{ include "wanxiang.namespace" . }}
  labels:
    {{- include "wanxiang.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "wanxiang.fullname" . }}-api-server
  minReplicas: {{ .Values.apiServer.hpa.minReplicas }}
  maxReplicas: {{ .Values.apiServer.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiServer.hpa.targetCPUUtilization }}
    {{- if .Values.apiServer.hpa.targetMemoryUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiServer.hpa.targetMemoryUtilization }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
{{- end }}

{{- if .Values.apiServer.pdb.enabled }}
---
# === PDB — Pod 中断预算 ===
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "wanxiang.fullname" . }}-api-server
  namespace: {{ include "wanxiang.namespace" . }}
  labels:
    {{- include "wanxiang.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  minAvailable: {{ .Values.apiServer.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "wanxiang.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-server
{{- end }}

{{- end -}}
